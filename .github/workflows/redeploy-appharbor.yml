name: Trigger AppHarbor redeploy

# main に push されたら AppHarbor 本体の Vercel Deploy Hook を叩いて
# 本体を再ビルドさせ、最新のカートリッジを取り込ませる。
#
# 必要な設定:
#   リポジトリ Secrets に APPHARBOR_DEPLOY_HOOK_URL を登録すること。
#   (Vercel: AppHarbor プロジェクト → Settings → Git → Deploy Hooks で発行した URL)

on:
  push:
    branches: [main]

# 連続 push 時は最後の 1 回だけ走らせる
concurrency:
  group: redeploy-appharbor
  cancel-in-progress: true

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel Deploy Hook
        env:
          HOOK_URL: ${{ secrets.APPHARBOR_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::error::APPHARBOR_DEPLOY_HOOK_URL secret is not set"
            exit 1
          fi
          echo "Triggering AppHarbor redeploy..."
          curl -fsS -X POST "$HOOK_URL" -o response.json
          echo "Done:"
          cat response.json
